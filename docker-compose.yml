services:
  unifi-log-insight:
    build: .
    pull_policy: always
    container_name: unifi-log-insight
    restart: unless-stopped
    ports:
      - "514:514/udp"
      - "8090:8000"
    volumes:
      - pgdata:/var/lib/postgresql/data # Not needed when using external DB
      - ./maxmind:/app/maxmind
    # If you add real credentials here, do not commit this file, and 
    # instead use .env file instead for credentials/passwords
    #env_file:
    #- .env
    environment:
      POSTGRES_PASSWORD: "your_strong_password_here"
      ABUSEIPDB_API_KEY: "your_key_here"
      MAXMIND_ACCOUNT_ID: "your_account_id"
      MAXMIND_LICENSE_KEY: "your_license_key"
      LOG_LEVEL: "INFO"
      TZ: "Europe/London"
      UNIFI_API_KEY: "your_unifi_api_key_here"
      UNIFI_HOST: "https://192.168.1.1"
      # ── External Database (uncomment to use) ──
      # DB_HOST: "postgres"
      # DB_PORT: "5432"
      # DB_NAME: "unifi_logs"
      # DB_USER: "unifi"
      # DB_PASSWORD: "your_db_password"
      # DB_SSLMODE: "require"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

# ── Internal Database (Remove volumes section to use External DB) ──
volumes:
  pgdata:
    name: unifi-log-insight-pgdata
